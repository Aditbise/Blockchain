<p>create-transaction works!</p>
<div class="container">
    <h1>Create transaction</h1>
    <p>Transfer some money to someone!</p>
    <br>
    <div class="form-group">
        <label for="from">From Address</label>
        <input type="text" class="form-control" [(ngModel)]="walletKey.publicKey" disabled>
    </div>
    <div class="form-group">
        <label for="from">To Address</label>
        <input type="text" class="form-control" [(ngModel)]="newTx.toAddress">
    </div>
    <div class="form-group">
        <label for="from">Amount</label>
        <input type="text" class="form-control" [(ngModel)]="newTx.amount">
    </div>
    <button (click)="createTransaction()" class="btn btn-primary">Sign & create transaction</button>
</div>
