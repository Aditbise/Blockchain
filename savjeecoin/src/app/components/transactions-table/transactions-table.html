<p *ngIf="!isArray(processedTransactions) || processedTransactions.length === 0">This block has no transactions</p>
<table class="table table-hover table-striped" *ngIf="isArray(processedTransactions) && processedTransactions.length > 0">
    <thead>
        <tr>
            <th scope="col">#</th>
            <th scope="col">From</th>
            <th scope="col">To</th>
            <th scope="col">Amount</th>
            <th scope="col">Timestamp</th>
            <th scope="col">Valid?</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let tx of processedTransactions; let i = index">
            <td>{{i}}</td>
            <td class="text-truncate" title="{{ tx.fromAddress || 'System' }}">
                <span *ngIf="tx.fromAddress !== null">{{ tx.fromAddress | slice: 0:20 }}...</span>
                <span *ngIf="tx.fromAddress === null" class="text-muted">System (Reward)</span>
            </td>
            <td class="text-truncate" title="{{ tx.toAddress }}">
                {{tx.toAddress | slice:0:20}}...
            </td>
            <td>
                {{tx.amount}}
                <span *ngIf="tx.fromAddress === null" class="text-muted"><br><small>(Block reward)</small></span>
            </td>
            <td>
                <span *ngIf="tx.timestamp">
                    {{ tx.timestamp | date: 'MMM dd, yyyy' }}<br>
                    <small class="text-muted">{{ tx.timestamp | date: 'HH:mm:ss' }}</small>
                </span>
                <span *ngIf="!tx.timestamp" class="text-muted">-</span>
            </td>
            <td style="max-width: 40px;">
                <span *ngIf="tx.isValid && tx.isValid()" class="badge bg-success">✓ Valid</span>
                <span *ngIf="!tx.isValid || !tx.isValid()" class="badge bg-danger">✗ Invalid</span>
            </td>
        </tr>
    </tbody>
</table>
